apiVersion: apps/v1
kind: Deployment
metadata:
  name: kraftplan-api
  namespace: kraftplan-api
spec:
  replicas: 2
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kraftplan-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kraftplan-api
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: kraftplan-api
          image: ghcr.io/your-org/kraftplan-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
