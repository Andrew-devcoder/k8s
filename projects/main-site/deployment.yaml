apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-site
  namespace: main-site
spec:
  replicas: 2
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: main-site
  template:
    metadata:
      labels:
        app.kubernetes.io/name: main-site
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: main-site
          image: ghcr.io/your-org/main-site:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
