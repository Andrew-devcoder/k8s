apiVersion: apps/v1
kind: Deployment
metadata:
  name: b2b
  namespace: b2b
spec:
  replicas: 2
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: b2b
  template:
    metadata:
      labels:
        app.kubernetes.io/name: b2b
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: b2b
          image: ghcr.io/your-org/b2b:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
