apiVersion: apps/v1
kind: Deployment
metadata:
    name: iren
    namespace: iren
spec:
    replicas: 1
    revisionHistoryLimit: 10
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxUnavailable: 0
            maxSurge: 1
    selector:
        matchLabels:
            app.kubernetes.io/name: iren
    template:
        metadata:
            labels:
                app.kubernetes.io/name: iren
        spec:
            automountServiceAccountToken: false
            securityContext:
                seccompProfile:
                    type: RuntimeDefault
            imagePullSecrets:
                - name: ghcr-secret
            containers:
                - name: iren
                  image: ghcr.io/andrew-devcoder/iren:first
                  imagePullPolicy: IfNotPresent
                  envFrom:
                      - secretRef:
                            name: iren-env
                  ports:
                      - containerPort: 3000
                        name: http
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop:
                              - ALL
                  resources:
                      requests:
                          cpu: 100m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 256Mi
                  readinessProbe:
                      httpGet:
                          path: /
                          port: http
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  livenessProbe:
                      httpGet:
                          path: /
                          port: http
                      initialDelaySeconds: 15
                      periodSeconds: 20
